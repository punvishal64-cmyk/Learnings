<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-compact-disc fa-spin-hover"></i>
                <span>AudioStream Pro</span>
            </div>
            
            <nav class="main-nav">
                <ul>
                    <li class="active"><i class="fa-solid fa-house"></i> Home</li>
                    <li><i class="fa-solid fa-magnifying-glass"></i> Search</li>
                    <li><i class="fa-solid fa-book-open"></i> Your Library</li>
                </ul>
            </nav>

            <div class="playlists-container">
                <div class="playlist-header">
                    <h3>Playlists</h3>
                    <button id="add-playlist-btn" title="Create Playlist"><i class="fa-solid fa-plus"></i></button>
                </div>
                <ul class="playlist-list" id="user-playlists">
                    <li class="playlist-item favorite-list"><i class="fa-solid fa-heart"></i> Liked Songs</li>
                    <li class="playlist-item">Workout Mix</li>
                    <li class="playlist-item">Deep Focus</li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-container">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search artists, songs, or podcasts...">
                </div>
                <div class="user-profile">
                    <button class="upgrade-btn">Upgrade</button>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <section class="content-area">
                <h2 class="section-title">Trending Now</h2>
                <div class="tracks-header">
                    <span>#</span>
                    <span>Title</span>
                    <span>Album</span>
                    <span><i class="fa-regular fa-clock"></i></span>
                </div>
                <div class="track-list" id="track-list"></div>
            </section>
        </main>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <img src="https://via.placeholder.com/60" alt="Album Art" id="current-cover">
            <div class="track-info">
                <div class="track-name" id="current-title">No track selected</div>
                <div class="track-artist" id="current-artist">--</div>
            </div>
            <button class="icon-btn fav-btn" id="current-fav-btn"><i class="fa-regular fa-heart"></i></button>
        </div>

        <div class="player-controls-wrapper">
            <div class="player-controls">
                <button class="icon-btn secondary-control"><i class="fa-solid fa-shuffle"></i></button>
                <button class="icon-btn" id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
                <button class="icon-btn play-pause-btn" id="play-pause-btn"><i class="fa-solid fa-circle-play"></i></button>
                <button class="icon-btn" id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
                <button class="icon-btn secondary-control"><i class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="progress-container">
                <span class="time-display" id="current-time">0:00</span>
                <input type="range" class="progress-bar" id="progress-bar" min="0" max="100" value="0">
                <span class="time-display" id="total-time">0:00</span>
            </div>
        </div>

        <div class="volume-controls">
            <button class="icon-btn" id="mute-btn"><i class="fa-solid fa-volume-high"></i></button>
            <input type="range" class="progress-bar volume-bar" id="volume-bar" min="0" max="1" step="0.01" value="1">
            <button class="icon-btn" title="Add to Playlist" id="add-to-queue"><i class="fa-solid fa-list"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
