<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="color: black;">Tic Tac Toe</h1>   
    <h2 id="status">Player X's Turn</h2>

    <div id="scoreboard">
    <p>X: <span id="xScore">0</span></p>
    <p>O: <span id="oScore">0</span></p>
   </div>

    <div class="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>

    <button id="resetBtn">Reset Game</button>

    <script src="script.js"></script>
</body>
</html>
